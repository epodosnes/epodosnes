<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Race Day Board</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow">Race Day Board</p>
          <h1>&#20170;&#26085;&#12398;&#38283;&#20652;&#12434;&#19968;&#30446;&#12391;&#30906;&#35469;</h1>
        </div>
        <div class="today-badge" id="todayBadge"></div>
      </header>

      <section class="toolbar" aria-label="date filters">
        <div class="date-controls">
          <button class="icon-button" type="button" id="prevDate" aria-label="previous day">&lt;</button>
          <label class="date-picker">
            <span>&#26085;&#20184;</span>
            <input type="date" id="dateInput">
          </label>
          <button class="icon-button" type="button" id="nextDate" aria-label="next day">&gt;</button>
        </div>
        <div class="quick-actions">
          <button type="button" data-offset="0">&#20170;&#26085;</button>
          <button type="button" data-offset="1">&#26126;&#26085;</button>
          <button type="button" id="nextWeekend">&#36913;&#26411;</button>
          <button type="button" id="nextEventDate">&#27425;&#12398;&#38283;&#20652;&#26085;</button>
        </div>
      </section>

      <section class="filter-panel" aria-label="extra filters">
        <label class="select-field search-field">
          <span>&#26908;&#32034;</span>
          <input type="search" id="searchInput" placeholder="JRA / &#22823;&#20117; / &#20303;&#20043;&#27743; / &#31478;&#36650;">
        </label>
        <label class="select-field">
          <span>&#22320;&#22495;</span>
          <select id="regionSelect">
            <option value="all">&#12377;&#12409;&#12390;</option>
          </select>
        </label>
        <label class="select-field">
          <span>&#29366;&#24907;</span>
          <select id="statusSelect">
            <option value="all">&#12377;&#12409;&#12390;</option>
            <option value="live">&#38283;&#20652;&#20013;</option>
            <option value="upcoming">&#12371;&#12428;&#12363;&#12425;</option>
            <option value="finished">&#32066;&#20102;</option>
          </select>
        </label>
        <label class="check-field">
          <input type="checkbox" id="nightOnly">
          <span>&#12490;&#12452;&#12479;&#12540;&#12398;&#12415;</span>
        </label>
        <label class="check-field">
          <input type="checkbox" id="favoriteOnly">
          <span>&#12362;&#27671;&#12395;&#20837;&#12426;&#12398;&#12415;</span>
        </label>
        <button class="secondary-button" type="button" id="clearFilters">&#26465;&#20214;&#12463;&#12522;&#12450;</button>
      </section>

      <p class="source-note" id="dataIntroNote">&#38283;&#20652;&#12487;&#12540;&#12479;&#12434;&#35501;&#12415;&#36796;&#12435;&#12391;&#12356;&#12414;&#12377;&#12290;</p>
      <p class="source-note" id="dataSourceNote">&#38283;&#20652;&#12487;&#12540;&#12479;&#30906;&#35469;&#20013;</p>
      <p class="source-note" id="dataCoverageNote"></p>
      <p class="source-note stale-note" id="dataStaleNote" hidden></p>
      <p class="source-note stale-note" id="dataCoverageWarning" hidden></p>

      <section class="insight-panel" aria-label="selected date status">
        <div>
          <span class="insight-label">&#36984;&#25246;&#26085;&#12398;&#29366;&#24907;</span>
          <strong id="insightMain"></strong>
          <small id="insightSub"></small>
        </div>
        <button class="secondary-button" type="button" id="insightNextButton"></button>
      </section>

      <section class="summary-grid" id="summaryGrid" aria-label="summary"></section>
      <section class="week-strip" id="weekStrip" aria-label="next seven days"></section>

      <nav class="category-tabs" id="categoryTabs" aria-label="category"></nav>

      <section class="list-meta">
        <div>
          <h2 id="listTitle">&#38283;&#20652;&#19968;&#35239;</h2>
          <p id="listDescription"></p>
        </div>
        <div class="list-tools">
          <button class="secondary-button" type="button" id="copyList">&#19968;&#35239;&#12434;&#12467;&#12500;&#12540;</button>
          <label class="select-field">
            <span>&#20006;&#12403;&#38918;</span>
            <select id="sortSelect">
              <option value="time">&#38283;&#22987;&#26178;&#21051;</option>
              <option value="category">&#12459;&#12486;&#12468;&#12522;</option>
              <option value="region">&#22320;&#22495;</option>
            </select>
          </label>
        </div>
      </section>

      <section class="event-list" id="eventList" aria-live="polite"></section>
    </main>

    <template id="summaryTemplate">
      <article class="summary-card">
        <span class="summary-label"></span>
        <strong class="summary-count"></strong>
        <small class="summary-note"></small>
      </article>
    </template>

    <template id="eventTemplate">
      <article class="event-card">
        <div class="event-main">
          <span class="category-pill"></span>
          <span class="night-pill"></span>
          <span class="date-pill"></span>
          <h3></h3>
          <p class="event-title"></p>
          <p class="event-memo"></p>
        </div>
        <button class="favorite-button" type="button" aria-label="favorite"></button>
        <dl class="event-details">
          <div>
            <dt>&#26178;&#38291;</dt>
            <dd class="event-time"></dd>
          </div>
          <div>
            <dt>&#22320;&#22495;</dt>
            <dd class="event-region"></dd>
          </div>
          <div>
            <dt>&#29366;&#24907;</dt>
            <dd class="event-status"></dd>
          </div>
        </dl>
        <button class="detail-button" type="button">&#35443;&#32048;</button>
        <a class="official-link" target="_blank" rel="noreferrer">&#20844;&#24335;</a>
      </article>
    </template>

    <div class="modal-backdrop" id="venueModal" hidden>
      <section class="venue-modal" role="dialog" aria-modal="true" aria-labelledby="modalVenueName">
        <header class="modal-header">
          <div>
            <span class="category-pill" id="modalCategory"></span>
            <h2 id="modalVenueName"></h2>
            <p id="modalTitle"></p>
          </div>
          <button class="modal-close" type="button" id="modalClose" aria-label="close">x</button>
        </header>
        <dl class="modal-details">
          <div>
            <dt>&#22320;&#22495;</dt>
            <dd id="modalRegion"></dd>
          </div>
          <div>
            <dt>&#26178;&#38291;</dt>
            <dd id="modalTime"></dd>
          </div>
          <div>
            <dt>&#29366;&#24907;</dt>
            <dd id="modalStatus"></dd>
          </div>
          <div>
            <dt>&#12490;&#12452;&#12479;&#12540;</dt>
            <dd id="modalNight"></dd>
          </div>
          <div>
            <dt>&#38283;&#20652;&#26465;&#20214;</dt>
            <dd id="modalSchedule"></dd>
          </div>
          <div>
            <dt>ID</dt>
            <dd id="modalId"></dd>
          </div>
          <div>
            <dt>&#12513;&#12514;</dt>
            <dd id="modalMemo"></dd>
          </div>
          <div>
            <dt>&#12450;&#12463;&#12475;&#12473;</dt>
            <dd id="modalAccess"></dd>
          </div>

        <div class="modal-actions">
          <button class="favorite-action" type="button" id="modalFavorite"></button>
          <a class="official-link" id="modalOfficial" target="_blank" rel="noreferrer">&#20844;&#24335;&#12469;&#12452;&#12488;&#12434;&#38283;&#12367;</a>
        </div>
      </section>
    </div>

        yesText: "\u3042\u308a",

        copyFailed: "\u30b3\u30d4\u30fc\u306b\u5931\u6557\u3057\u307e\u3057\u305f\u3002",

        insightShown: "\u8868\u793a",
        insightLive: "\u958b\u50ac\u4e2d",
        insightUpcoming: "\u3053\u308c\u304b\u3089",
        insightFinished: "\u7d42\u4e86",
        insightFavorite: "\u304a\u6c17\u306b\u5165\u308a",
        insightNext: "\u6b21\u306e\u8a72\u5f53\u65e5\u3078",
        insightNoNext: "\u8a72\u5f53\u65e5\u306a\u3057",
        insightNextPrefix: "\u6b21\u306f",
        coverageMonths: "\u53d6\u308a\u8fbc\u307f\u6e08\u307f\u6708",
        coverageMissing: "\u672a\u53d6\u5f97",
        coverageComplete: "\u53d6\u5f97\u6e08\u307f",
        coverageNotImported: "\u672a\u53d6\u308a\u8fbc\u307f",
        coveragePartialLabel: "\u4e00\u90e8\u672a\u53d6\u5f97",
        coverageNoMonth: "\u9078\u629e\u3057\u305f\u6708\u306e\u516c\u5f0f\u30c7\u30fc\u30bf\u304c\u307e\u3060\u53d6\u308a\u8fbc\u307e\u308c\u3066\u3044\u307e\u305b\u3093\u3002",
        coveragePartial: "\u9078\u629e\u3057\u305f\u6708\u3067\u672a\u53d6\u5f97\u306e\u30ab\u30c6\u30b4\u30ea: ",
        emptyNoMonthTitle: "\u3053\u306e\u6708\u306f\u672a\u53d6\u308a\u8fbc\u307f\u3067\u3059",
        emptyNoMonthHelp: "\u30c7\u30fc\u30bf\u66f4\u65b0\u5f8c\u306b\u958b\u50ac\u304c\u8868\u793a\u3055\u308c\u307e\u3059\u3002",
        emptyPartialTitle: "\u672a\u53d6\u5f97\u30ab\u30c6\u30b4\u30ea\u304c\u3042\u308a\u307e\u3059",
        emptyPartialHelp: "\u53d6\u5f97\u6e08\u307f\u30ab\u30c6\u30b4\u30ea\u306e\u958b\u50ac\u306e\u307f\u8868\u793a\u3057\u3066\u3044\u307e\u3059\u3002",
        blank: "-",
      };
      const weekdayLabels = ["\u65e5", "\u6708", "\u706b", "\u6c34", "\u6728", "\u91d1", "\u571f"];

      const categories = [
        { id: "all", label: text.all },
        { id: "jra", label: text.jra },
        { id: "local-keiba", label: text.local },
        { id: "boat", label: text.boat },
        { id: "auto", label: text.auto },
        { id: "keirin", label: text.keirin },
      ];

      const categoryMeta = {
        jra: { label: text.jra, accent: "#246bfe", officialUrl: "https://www.jra.go.jp/" },
        "local-keiba": { label: text.local, accent: "#b94700", officialUrl: "https://www.keiba.go.jp/" },
        boat: { label: text.boat, accent: "#008b8b", officialUrl: "https://www.boatrace.jp/" },
        auto: { label: text.auto, accent: "#7d4cc2", officialUrl: "https://autorace.jp/" },
        keirin: { label: text.keirin, accent: "#d12b5d", officialUrl: "https://www.keirin.jp/" },
      };

      const fallbackEvents = [
        makeEvent("jra-tokyo", "jra", "\u6771\u4eac\u7af6\u99ac\u5834", "\u6771\u4eac\u90fd", "09:50", "16:30", [0, 6], "https://www.jra.go.jp/"),
        makeEvent("local-oi", "local-keiba", "\u5927\u4e95\u7af6\u99ac\u5834", "\u6771\u4eac\u90fd", "14:20", "20:50", [1, 2, 3, 4, 5], "https://www.tokyocitykeiba.com/", true),
        makeEvent("boat-suminoe", "boat", "\u30dc\u30fc\u30c8\u30ec\u30fc\u30b9\u4f4f\u4e4b\u6c5f", "\u5927\u962a\u5e9c", "15:00", "20:45", [0, 2, 4, 6], "https://www.boatrace-suminoe.jp/", true),
        makeEvent("auto-kawaguchi", "auto", "\u5ddd\u53e3\u30aa\u30fc\u30c8\u30ec\u30fc\u30b9\u5834", "\u57fc\u7389\u770c", "10:40", "16:50", [0, 3, 5], "https://www.kawaguchiauto.jp/"),
        makeEvent("keirin-tachikawa", "keirin", "\u7acb\u5ddd\u7af6\u8f2a\u5834", "\u6771\u4eac\u90fd", "10:30", "16:30", [0, 6], "https://www.keirin.jp/"),
      ];
      const dataDiagnostics = {
        source: text.dataFallback,
        build: "inline-fallback",
        generatedAt: "",
        accepted: 0,
        rejected: 0,
      };
      const sampleEvents = normalizeEventSource(window.RaceDayExternalData && window.RaceDayExternalData.events);

      const state = {
        date: toIsoDate(new Date()),
        category: "all",
        region: "all",
        status: "all",
        query: "",
        nightOnly: false,
        favoriteOnly: false,
        favorites: new Set(loadFavorites()),
        sort: "time",
      };

      const els = {
        todayBadge: document.querySelector("#todayBadge"),
        dateInput: document.querySelector("#dateInput"),
        prevDate: document.querySelector("#prevDate"),
        nextDate: document.querySelector("#nextDate"),
        nextWeekend: document.querySelector("#nextWeekend"),
        nextEventDate: document.querySelector("#nextEventDate"),
        searchInput: document.querySelector("#searchInput"),
        regionSelect: document.querySelector("#regionSelect"),
        statusSelect: document.querySelector("#statusSelect"),
        nightOnly: document.querySelector("#nightOnly"),
        favoriteOnly: document.querySelector("#favoriteOnly"),
        clearFilters: document.querySelector("#clearFilters"),
        dataIntroNote: document.querySelector("#dataIntroNote"),
        dataSourceNote: document.querySelector("#dataSourceNote"),
        dataCoverageNote: document.querySelector("#dataCoverageNote"),
        dataStaleNote: document.querySelector("#dataStaleNote"),
        dataCoverageWarning: document.querySelector("#dataCoverageWarning"),
        insightMain: document.querySelector("#insightMain"),
        insightSub: document.querySelector("#insightSub"),
        insightNextButton: document.querySelector("#insightNextButton"),
        summaryGrid: document.querySelector("#summaryGrid"),
        weekStrip: document.querySelector("#weekStrip"),
        categoryTabs: document.querySelector("#categoryTabs"),
        copyList: document.querySelector("#copyList"),
        sortSelect: document.querySelector("#sortSelect"),
        listTitle: document.querySelector("#listTitle"),
        listDescription: document.querySelector("#listDescription"),
        eventList: document.querySelector("#eventList"),
        summaryTemplate: document.querySelector("#summaryTemplate"),
        eventTemplate: document.querySelector("#eventTemplate"),
        venueModal: document.querySelector("#venueModal"),
        modalClose: document.querySelector("#modalClose"),
        modalCategory: document.querySelector("#modalCategory"),
        modalVenueName: document.querySelector("#modalVenueName"),
        modalTitle: document.querySelector("#modalTitle"),
        modalRegion: document.querySelector("#modalRegion"),
        modalTime: document.querySelector("#modalTime"),
        modalStatus: document.querySelector("#modalStatus"),
        modalNight: document.querySelector("#modalNight"),
        modalSchedule: document.querySelector("#modalSchedule"),
        modalId: document.querySelector("#modalId"),
        modalMemo: document.querySelector("#modalMemo"),
        modalAccess: document.querySelector("#modalAccess"),
        modalFavorite: document.querySelector("#modalFavorite"),
        modalOfficial: document.querySelector("#modalOfficial"),
      };
      let activeModalEvent = null;
      let currentVisibleEvents = [];

      init();

      function init() {
        els.todayBadge.textContent = formatLongDate(new Date());
        els.dateInput.value = state.date;
        renderDataSourceNote();
        renderCoverageNote();
        renderCategoryTabs();
        renderRegionOptions();
        bindEvents();
        render();
      }

      function makeEvent(id, category, venueName, region, startTime, endTime, days, officialUrl, night) {
        return {
          id,
          category,
          venueName,
          title: night ? text.night : text.sample,
          region,
          startTime,
          endTime,
          days,
          officialUrl,
          night: Boolean(night),
        };
      }

      function normalizeEventSource(events) {
        if (!Array.isArray(events) || events.length === 0) {
          dataDiagnostics.accepted = fallbackEvents.length;
          return fallbackEvents;
        }

        const external = window.RaceDayExternalData || {};
        const normalized = events
          .filter(function (event) {
            const valid = isValidEvent(event);
            if (!valid) {
              dataDiagnostics.rejected += 1;
            }
            return valid;
          })
          .map(function (event) {
            return {
              id: String(event.id),
              category: String(event.category),
              venueName: String(event.venueName),
              title: event.title ? String(event.title) : event.night ? text.night : text.sample,
              region: String(event.region),
              startTime: String(event.startTime),
              endTime: String(event.endTime),
              days: Array.isArray(event.days) ? event.days.map(Number) : [],
              dates: Array.isArray(event.dates) ? event.dates.map(String) : [],
              officialUrl: String(event.officialUrl || categoryMeta[event.category].officialUrl),
              night: Boolean(event.night),
              memo: String(event.memo || ""),
              accessNote: String(event.accessNote || ""),
            };
          });

        if (normalized.length === 0) {
          dataDiagnostics.source = text.dataFallback;
          dataDiagnostics.build = "inline-fallback";
          dataDiagnostics.accepted = fallbackEvents.length;
          return fallbackEvents;
        }

        dataDiagnostics.source = external.sourceName || text.dataLoaded;
        dataDiagnostics.build = external.build || "external";
        dataDiagnostics.generatedAt = external.generatedAt || "";
        dataDiagnostics.accepted = normalized.length;
        return normalized;
      }

      function isValidEvent(event) {
        return Boolean(
          event &&
            event.id &&
            categoryMeta[event.category] &&
            event.venueName &&
            event.region &&
            isValidTime(event.startTime) &&
            isValidTime(event.endTime) &&
            (hasValidDays(event) || hasValidDates(event)),
        );
      }

      function hasValidDays(event) {
        return (
          Array.isArray(event.days) &&
          event.days.length > 0 &&
          event.days.every(function (day) {
            return Number.isInteger(Number(day)) && Number(day) >= 0 && Number(day) <= 6;
          })
        );
      }

      function hasValidDates(event) {
        return (
          Array.isArray(event.dates) &&
          event.dates.length > 0 &&
          event.dates.every(function (date) {
            return /^\d{4}-\d{2}-\d{2}$/.test(String(date));
          })
        );
      }

      function isValidTime(value) {
        return /^([01]\d|2[0-3]):[0-5]\d$/.test(String(value || ""));
      }

      function renderDataSourceNote() {
        const dataAgeDays = getDataAgeDays(dataDiagnostics.generatedAt);
        els.dataIntroNote.textContent = dataDiagnostics.source === text.dataFallback ? text.introFallback : text.introExternal;
        els.dataSourceNote.textContent =
          "\u958b\u50ac\u30c7\u30fc\u30bf: " +
          dataDiagnostics.source +
          " / " +
          text.accepted +
          ": " +
          dataDiagnostics.accepted +
          " / " +
          text.rejected +
          ": " +
          dataDiagnostics.rejected +
          formatGeneratedAtNote(dataDiagnostics.generatedAt);
        renderStaleNote(dataAgeDays);
      }

      function formatGeneratedAtNote(value) {
        if (!value) {
          return "";
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return " / " + text.updated + ": " + value;
        }

        return " / " + text.updated + ": " + formatLongDateTime(date);
      }

      function renderStaleNote(ageDays) {
        if (ageDays === null || ageDays < 3) {
          els.dataStaleNote.hidden = true;
          els.dataStaleNote.textContent = "";
          return;
        }

        els.dataStaleNote.hidden = false;
        els.dataStaleNote.textContent = text.stalePrefix + ageDays + text.staleSuffix;
      }

      function renderCoverageNote() {
        const coverage = getCoverage();
        if (!coverage.months.length) {
          els.dataCoverageNote.textContent = "";
          return;
        }

        els.dataCoverageNote.textContent =
          text.coverageMonths +
          ": " +
          coverage.months.map(formatCoverageMonth).join(", ");
      }

      function renderCoverageWarning() {
        const status = getCoverageStatus(state.date.slice(0, 7));
        if (status.status === "not-imported") {
          els.dataCoverageWarning.hidden = false;
          els.dataCoverageWarning.textContent = text.coverageNoMonth;
          return;
        }

        if (status.status !== "partial") {
          els.dataCoverageWarning.hidden = true;
          els.dataCoverageWarning.textContent = "";
          return;
        }

        els.dataCoverageWarning.hidden = false;
        els.dataCoverageWarning.textContent =
          text.coveragePartial +
          status.missing.map(function (category) {
            return categoryMeta[category] ? categoryMeta[category].label : category;
          }).join(", ");
      }

      function getCoverage() {
        const external = window.RaceDayExternalData || {};
        const coverage = external.coverage || {};
        return {
          months: Array.isArray(coverage.months) ? coverage.months : [],
          missingByMonth: coverage.missingByMonth || {},
        };
      }

      function getCoverageStatus(month) {
        const coverage = getCoverage();
        if (!coverage.months.length || coverage.months.indexOf(month) === -1) {
          return {
            status: "not-imported",
            missing: categories.filter(function (category) {
              return category.id !== "all";
            }).map(function (category) {
              return category.id;
            }),
          };
        }

        const missing = coverage.missingByMonth[month] || [];
        return {
          status: missing.length ? "partial" : "complete",
          missing: missing,
        };
      }

      function isCategoryMissingForSelectedMonth(categoryId) {
        const status = getCoverageStatus(state.date.slice(0, 7));
        return status.status === "not-imported" || status.missing.indexOf(categoryId) !== -1;
      }

      function formatCoverageStatusText(month) {
        const status = getCoverageStatus(month);
        if (status.status === "complete") {
          return text.coverageComplete;
        }
        if (status.status === "not-imported") {
          return text.coverageNotImported;
        }
        return text.coveragePartialLabel + ": " + status.missing.map(function (category) {
          return categoryMeta[category] ? categoryMeta[category].label : category;
        }).join(", ");
      }

      function formatCoverageMonth(value) {
        const parts = String(value).split("-");
        if (parts.length !== 2) {
          return value;
        }

        return Number(parts[0]) + "/" + Number(parts[1]);
      }

      function formatInsightCoverageText() {
        const coverage = getCoverage();
        const selectedMonth = state.date.slice(0, 7);
        if (!coverage.months.length) {
          return "";
        }

        const status = getCoverageStatus(selectedMonth);
        if (status.status === "not-imported") {
          return " / " + text.coverageMissing + ": " + formatCoverageMonth(selectedMonth);
        }

        if (status.status !== "partial") {
          return "";
        }

        return (
          " / " +
          text.coverageMissing +
          ": " +
          status.missing.map(function (category) {
            return categoryMeta[category] ? categoryMeta[category].label : category;
          }).join(", ")
        );
      }

      function getDataAgeDays(value) {
        if (!value) {
          return null;
        }

        const date = new Date(value);
        if (Number.isNaN(date.getTime())) {
          return null;
        }

        return Math.max(0, Math.floor((Date.now() - date.getTime()) / 86400000));
      }

      function bindEvents() {
        els.dateInput.addEventListener("change", function (event) {
          state.date = event.target.value || toIsoDate(new Date());
          render();
        });
        els.prevDate.addEventListener("click", function () {
          shiftDate(-1);
        });
        els.nextDate.addEventListener("click", function () {
          shiftDate(1);
        });
        document.querySelectorAll("[data-offset]").forEach(function (button) {
          button.addEventListener("click", function () {
            const date = new Date();
            date.setDate(date.getDate() + Number(button.dataset.offset));
            setDate(date);
          });
        });
        els.nextWeekend.addEventListener("click", function () {
          setDate(getNextWeekend(new Date()));
        });
        els.nextEventDate.addEventListener("click", function () {
          const nextDate = findNextEventDate();
          if (nextDate) {
            setDate(nextDate);
          } else {
            window.alert(text.noUpcoming);
          }
        });
        els.insightNextButton.addEventListener("click", function () {
          const nextDate = findNextEventDate();
          if (nextDate) {
            setDate(nextDate);
          }
        });
        els.searchInput.addEventListener("input", function (event) {
          state.query = normalizeSearch(event.target.value);
          render();
        });
        els.regionSelect.addEventListener("change", function (event) {
          state.region = event.target.value;
          render();
        });
        els.statusSelect.addEventListener("change", function (event) {
          state.status = event.target.value;
          render();
        });
        els.nightOnly.addEventListener("change", function (event) {
          state.nightOnly = event.target.checked;
          render();
        });
        els.favoriteOnly.addEventListener("change", function (event) {
          state.favoriteOnly = event.target.checked;
          render();
        });
        els.clearFilters.addEventListener("click", function () {
          state.category = "all";
          state.region = "all";
          state.status = "all";
          state.query = "";
          state.nightOnly = false;
          state.favoriteOnly = false;
          els.searchInput.value = "";
          els.regionSelect.value = "all";
          els.statusSelect.value = "all";
          els.nightOnly.checked = false;
          els.favoriteOnly.checked = false;
          render();
        });
        els.sortSelect.addEventListener("change", function (event) {
          state.sort = event.target.value;
          render();
        });
        els.copyList.addEventListener("click", copyVisibleList);
        els.modalClose.addEventListener("click", closeVenueModal);
        els.venueModal.addEventListener("click", function (event) {
          if (event.target === els.venueModal) {
            closeVenueModal();
          }
        });
        els.modalFavorite.addEventListener("click", function () {
          if (!activeModalEvent) {
            return;
          }
          toggleFavorite(activeModalEvent.id);
          const refreshed = fetchScheduleForDate(activeModalEvent.date).find(function (event) {
            return event.id === activeModalEvent.id;
          });
          if (refreshed) {
            openVenueModal(refreshed);
          }
        });
        document.addEventListener("keydown", function (event) {
          if (event.key === "Escape" && !els.venueModal.hidden) {
            closeVenueModal();
          }
        });
      }

      function render() {
        const events = fetchScheduleForDate(state.date);
        const filteredEvents = filterEvents(events);

        currentVisibleEvents = sortEvents(filteredEvents, state.sort);
        renderSummary(events);
        renderInsights(events, filteredEvents);
        renderCoverageWarning();
        renderWeekStrip();
        renderList(currentVisibleEvents);
        updateMeta(filteredEvents.length);
        syncActiveTabs();
      }

      function filterEvents(events) {
        return events.filter(function (event) {
          const categoryMatch = state.category === "all" || event.category === state.category;
          const regionMatch = state.region === "all" || event.region === state.region;
          const statusMatch = state.status === "all" || event.statusKey === state.status;
          const queryMatch = !state.query || normalizeSearch([
            event.venueName,
            event.title,
            event.region,
            event.memo,
            event.accessNote,
            categoryMeta[event.category].label,
          ].join(" ")).includes(state.query);
          const nightMatch = !state.nightOnly || event.night;
          const favoriteMatch = !state.favoriteOnly || state.favorites.has(event.id);
          return categoryMatch && regionMatch && statusMatch && queryMatch && nightMatch && favoriteMatch;
        });
      }

      function fetchScheduleForDate(date) {
        const selected = new Date(date + "T00:00:00");
        const day = selected.getDay();
        return sampleEvents
          .filter(function (event) {
            return isEventOnDate(event, date, day);
          })
          .map(function (event) {
            const statusInfo = resolveStatus(date, event.startTime, event.endTime);
            return { ...event, date: date, status: statusInfo.label, statusKey: statusInfo.key };
          });
      }

      function isEventOnDate(event, date, day) {
        const matchesExactDate = Array.isArray(event.dates) && event.dates.includes(date);
        const matchesWeekday = Array.isArray(event.days) && event.days.includes(day);
        return matchesExactDate || matchesWeekday;
      }

      function renderSummary(events) {
        els.summaryGrid.replaceChildren();
        categories
          .filter(function (category) {
            return category.id !== "all";
          })
          .forEach(function (category) {
            const count = events.filter(function (event) {
              return event.category === category.id;
            }).length;
            const node = els.summaryTemplate.content.firstElementChild.cloneNode(true);
            const categoryMissing = isCategoryMissingForSelectedMonth(category.id);
            node.style.setProperty("--accent", categoryMeta[category.id].accent);
            node.classList.toggle("is-missing-data", categoryMissing);
            node.querySelector(".summary-label").textContent = category.label;
            node.querySelector(".summary-count").textContent = count + text.venueUnit;
            node.querySelector(".summary-note").textContent = categoryMissing ? text.coverageMissing : count > 0 ? text.yes : text.no;
            els.summaryGrid.append(node);
          });
      }

      function renderInsights(events, filteredEvents) {
        const liveCount = events.filter(function (event) {
          return event.statusKey === "live";
        }).length;
        const upcomingCount = events.filter(function (event) {
          return event.statusKey === "upcoming";
        }).length;
        const finishedCount = events.filter(function (event) {
          return event.statusKey === "finished";
        }).length;
        const favoriteCount = events.filter(function (event) {
          return state.favorites.has(event.id);
        }).length;
        const nextDate = findNextEventDate();

        els.insightMain.textContent =
          text.insightTotal +
          " " +
          events.length +
          text.itemUnit +
          " / " +
          text.insightShown +
          " " +
          filteredEvents.length +
          text.itemUnit;
        els.insightSub.textContent =
          text.insightLive +
          ": " +
          liveCount +
          " / " +
          text.insightUpcoming +
          ": " +
          upcomingCount +
          " / " +
          text.insightFinished +
          ": " +
          finishedCount +
          " / " +
          text.insightFavorite +
          ": " +
          favoriteCount +
          formatInsightCoverageText();
        els.insightNextButton.disabled = !nextDate;
        els.insightNextButton.textContent = nextDate
          ? text.insightNextPrefix + " " + formatShortDate(nextDate) + " / " + text.insightNext
          : text.insightNoNext;
      }

      function renderCategoryTabs() {
        els.categoryTabs.replaceChildren();
        categories.forEach(function (category) {
          const button = document.createElement("button");
          button.type = "button";
          button.dataset.category = category.id;
          button.textContent = category.label;
          button.addEventListener("click", function () {
            state.category = category.id;
            render();
          });
          els.categoryTabs.append(button);
        });
      }

      function renderRegionOptions() {
        const regions = [...new Set(sampleEvents.map(function (event) {
          return event.region;
        }))].sort(function (a, b) {
          return a.localeCompare(b, "ja");
        });
        regions.forEach(function (region) {
          const option = document.createElement("option");
          option.value = region;
          option.textContent = region;
          els.regionSelect.append(option);
        });
      }

      function renderWeekStrip() {
        els.weekStrip.replaceChildren();
        const baseDate = new Date(state.date + "T00:00:00");

        for (let offset = 0; offset < 7; offset += 1) {
          const date = new Date(baseDate);
          date.setDate(baseDate.getDate() + offset);
          const isoDate = toIsoDate(date);
          const count = filterEvents(fetchScheduleForDate(isoDate)).length;
          const coverageStatus = getCoverageStatus(isoDate.slice(0, 7));
          const button = document.createElement("button");
          button.type = "button";
          button.className = "day-chip";
          button.classList.toggle("active", isoDate === state.date);
          button.classList.toggle("coverage-missing", coverageStatus.status !== "complete");
          button.disabled = count === 0 && coverageStatus.status === "complete";
          button.innerHTML =
            "<span>" + formatShortDate(date) + "</span><strong>" + count + text.itemUnit + "</strong>";
          button.addEventListener("click", function () {
            setDate(date);
          });
          els.weekStrip.append(button);
        }
      }

      function renderList(events) {
        els.eventList.replaceChildren();
        if (events.length === 0) {
          const emptyText = getEmptyStateText();
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.innerHTML = "<strong>" + emptyText.title + "</strong><span>" + emptyText.help + "</span>";
          els.eventList.append(empty);
          return;
        }
        events.forEach(function (event) {
          const meta = categoryMeta[event.category];
          const node = els.eventTemplate.content.firstElementChild.cloneNode(true);
          node.style.setProperty("--accent", meta.accent);
          node.classList.toggle("is-live", event.statusKey === "live");
          node.querySelector(".category-pill").textContent = meta.label;
          const nightPill = node.querySelector(".night-pill");
          nightPill.textContent = event.night ? text.nightLabel : "";
          nightPill.hidden = !event.night;
          const datePill = node.querySelector(".date-pill");
          const hasExactDate = Array.isArray(event.dates) && event.dates.length > 0;
          datePill.textContent = hasExactDate ? text.exactDates : "";
          datePill.hidden = !hasExactDate;
          node.querySelector("h3").textContent = event.venueName;
          node.querySelector(".event-title").textContent = event.title;
          node.querySelector(".event-memo").textContent = event.memo || event.accessNote || "";
          node.querySelector(".event-time").textContent = event.startTime + " - " + event.endTime;
          node.querySelector(".event-region").textContent = event.region;
          node.querySelector(".event-status").textContent = event.status;
          node.querySelector(".official-link").href = event.officialUrl || meta.officialUrl;
          const favoriteButton = node.querySelector(".favorite-button");
          const isFavorite = state.favorites.has(event.id);
          favoriteButton.dataset.eventId = event.id;
          favoriteButton.classList.toggle("active", isFavorite);
          favoriteButton.innerHTML = isFavorite ? "&#9733;" : "&#9734;";
          favoriteButton.addEventListener("click", function () {
            toggleFavorite(event.id);
          });
          node.querySelector(".detail-button").addEventListener("click", function () {
            openVenueModal(event);
          });
          els.eventList.append(node);
        });
      }

      function getEmptyStateText() {
        const status = getCoverageStatus(state.date.slice(0, 7));
        if (status.status === "not-imported") {
          return {
            title: text.emptyNoMonthTitle,
            help: text.emptyNoMonthHelp,
          };
        }

        if (status.status === "partial") {
          const missingLabels = status.missing.map(function (category) {
            return categoryMeta[category] ? categoryMeta[category].label : category;
          }).join(", ");
          if (state.category === "all" || status.missing.indexOf(state.category) !== -1) {
            return {
              title: text.emptyPartialTitle,
              help: text.emptyPartialHelp + " " + text.coverageMissing + ": " + missingLabels,
            };
          }
        }

        return {
          title: text.emptyTitle,
          help: text.emptyHelp,
        };
      }

      function copyVisibleList() {
        const lines = [
          formatLongDate(new Date(state.date + "T00:00:00")) + " / " + currentVisibleEvents.length + text.itemUnit,
          formatCoverageStatusText(state.date.slice(0, 7)),
          formatFilterSummary(),
          "",
        ];

        currentVisibleEvents.forEach(function (event) {
          const meta = categoryMeta[event.category];
          lines.push(
            [
              event.startTime + "-" + event.endTime,
              meta.label,
              event.venueName,
              event.region,
              event.status,
              event.night ? text.nightLabel : "",
              event.memo || "",
            ]
              .filter(Boolean)
              .join(" / "),
          );
        });

        writeClipboard(lines.join("\n"))
          .then(function () {
            window.alert(text.copyDone);
          })
          .catch(function () {
            window.alert(text.copyFailed);
          });
      }

      function formatFilterSummary() {
        const category = categories.find(function (item) {
          return item.id === state.category;
        });
        const filters = [
          category ? category.label : text.all,
          state.region === "all" ? text.all : state.region,
          state.status === "all" ? text.all : state.status,
        ];
        if (state.nightOnly) {
          filters.push(text.nightLabel);
        }
        if (state.favoriteOnly) {
          filters.push(text.insightFavorite);
        }
        if (state.query) {
          filters.push(state.query);
        }
        return filters.join(" / ");
      }

      function writeClipboard(value) {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          return navigator.clipboard.writeText(value);
        }

        return new Promise(function (resolve, reject) {
          const textarea = document.createElement("textarea");
          textarea.value = value;
          textarea.setAttribute("readonly", "");
          textarea.style.position = "fixed";
          textarea.style.left = "-9999px";
          document.body.append(textarea);
          textarea.select();
          const ok = document.execCommand("copy");
          textarea.remove();
          ok ? resolve() : reject(new Error("copy failed"));
        });
      }

      function openVenueModal(event) {
        const meta = categoryMeta[event.category];
        const isFavorite = state.favorites.has(event.id);
        activeModalEvent = event;
        els.modalCategory.textContent = meta.label;
        els.modalCategory.style.setProperty("--accent", meta.accent);
        els.modalVenueName.textContent = event.venueName;
        els.modalTitle.textContent = event.title;
        els.modalRegion.textContent = event.region;
        els.modalTime.textContent = event.startTime + " - " + event.endTime;
        els.modalStatus.textContent = event.status;
        els.modalNight.textContent = event.night ? text.yesText : text.noText;
        els.modalSchedule.textContent = formatSchedule(event);
        els.modalId.textContent = event.id;
        els.modalMemo.textContent = event.memo || text.blank;
        els.modalAccess.textContent = event.accessNote || text.blank;
        els.modalFavorite.textContent = isFavorite ? text.favoriteRemove : text.favoriteAdd;
        els.modalFavorite.classList.toggle("active", isFavorite);
        els.modalOfficial.href = event.officialUrl || meta.officialUrl;
        els.venueModal.hidden = false;
        document.body.classList.add("modal-open");
      }

      function closeVenueModal() {
        els.venueModal.hidden = true;
        activeModalEvent = null;
        document.body.classList.remove("modal-open");
      }

      function formatSchedule(event) {
        const parts = [];
        if (Array.isArray(event.days) && event.days.length > 0) {
          parts.push(text.everyWeek + " " + event.days.map(function (day) {
            return weekdayLabels[day];
          }).join(" / "));
        }
        if (Array.isArray(event.dates) && event.dates.length > 0) {
          parts.push(text.exactDates + " " + event.dates.join(" / "));
        }
        return parts.join(" / ");
      }

      function toggleFavorite(eventId) {
        if (state.favorites.has(eventId)) {
          state.favorites.delete(eventId);
        } else {
          state.favorites.add(eventId);
        }
        saveFavorites();
        render();
      }

      function loadFavorites() {
        try {
          const stored = localStorage.getItem("raceDayFavorites");
          return stored ? JSON.parse(stored) : [];
        } catch (error) {
          return [];
        }
      }

      function saveFavorites() {
        try {
          localStorage.setItem("raceDayFavorites", JSON.stringify(Array.from(state.favorites)));
        } catch (error) {
          return;
        }
      }

      function updateMeta(count) {
        const category = categories.find(function (item) {
          return item.id === state.category;
        });
        els.listTitle.textContent = category.label + text.titleSuffix;
        els.listDescription.textContent =
          formatLongDate(new Date(state.date + "T00:00:00")) +
          " / " +
          count +
          text.itemUnit +
          " / " +
          formatCoverageStatusText(state.date.slice(0, 7));
      }

      function syncActiveTabs() {
        els.categoryTabs.querySelectorAll("button").forEach(function (button) {
          button.classList.toggle("active", button.dataset.category === state.category);
        });
      }

      function sortEvents(events, sort) {
        return events.slice().sort(function (a, b) {
          if (sort === "category") {
            return categoryMeta[a.category].label.localeCompare(categoryMeta[b.category].label, "ja");
          }
          if (sort === "region") {
            return a.region.localeCompare(b.region, "ja");
          }
          return a.startTime.localeCompare(b.startTime);
        });
      }

      function shiftDate(days) {
        const date = new Date(state.date + "T00:00:00");
        date.setDate(date.getDate() + days);
        setDate(date);
      }

      function setDate(date) {
        state.date = toIsoDate(date);
        els.dateInput.value = state.date;
        render();
      }

      function getNextWeekend(date) {
        const next = new Date(date);
        const day = next.getDay();
        const distanceToSaturday = day === 6 ? 0 : (6 - day + 7) % 7;
        next.setDate(next.getDate() + distanceToSaturday);
        return next;
      }

      function findNextEventDate() {
        const date = new Date(state.date + "T00:00:00");
        for (let offset = 1; offset <= 30; offset += 1) {
          const candidate = new Date(date);
          candidate.setDate(candidate.getDate() + offset);
          const isoDate = toIsoDate(candidate);
          if (filterEvents(fetchScheduleForDate(isoDate)).length > 0) {
            return candidate;
          }
        }
        return null;
      }

      function resolveStatus(date, startTime, endTime) {
        const now = new Date();
        const today = toIsoDate(now);
        if (date < today) return { key: "finished", label: text.finished };
        if (date > today) return { key: "upcoming", label: text.scheduled };
        const start = new Date(date + "T" + startTime + ":00");
        const end = new Date(date + "T" + endTime + ":00");
        if (now < start) return { key: "upcoming", label: text.scheduled };
        if (now > end) return { key: "finished", label: text.finished };
        return { key: "live", label: text.live };
      }

      function normalizeSearch(value) {
        return String(value || "").trim().toLowerCase();
      }

      function formatLongDate(date) {
        return new Intl.DateTimeFormat("ja-JP", {
          year: "numeric",
          month: "long",
          day: "numeric",
          weekday: "short",
        }).format(date);
      }

      function formatLongDateTime(date) {
        return new Intl.DateTimeFormat("ja-JP", {
          year: "numeric",
          month: "numeric",
          day: "numeric",
          hour: "2-digit",
          minute: "2-digit",
        }).format(date);
      }

      function formatShortDate(date) {
        return new Intl.DateTimeFormat("ja-JP", {
          month: "numeric",
          day: "numeric",
          weekday: "short",
        }).format(date);
      }

      function toIsoDate(date) {
        const year = date.getFullYear();
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return year + "-" + month + "-" + day;
      }
    </script>
  </body>
</html>
